apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-registry-cleanup
  namespace: optio
  labels:
    app.kubernetes.io/name: image-registry-cleanup
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/part-of: optio
spec:
  # Run daily at 2:00 AM UTC
  schedule: "0 2 * * *"
  # Use local time zone
  timeZone: "UTC"
  # Don't start a new job if the previous one is still running
  concurrencyPolicy: Forbid
  # Keep last 3 successful and 3 failed job history
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Job should complete within 10 minutes
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: image-registry-cleanup
            app.kubernetes.io/component: cleanup
        spec:
          restartPolicy: Never
          serviceAccountName: image-cleanup-sa
          containers:
            - name: cleanup
              # Use a lightweight image with node and our cleanup script
              image: optio-image-builder:latest
              command: ["node"]
              args:
                - "--import"
                - "tsx"
                - "-e"
                - |
                  import { ImageCleanupService } from './src/ImageCleanupService.js';

                  const service = new ImageCleanupService({
                    registryUrl: process.env.REGISTRY_URL || 'http://registry.local:5000',
                    keepLatest: parseInt(process.env.KEEP_LATEST || '5', 10),
                    imagePrefix: process.env.IMAGE_PREFIX || 'optio-agent',
                  });

                  service.cleanup()
                    .then(result => {
                      console.log('Cleanup completed:', JSON.stringify(result, null, 2));
                      if (result.failed > 0) {
                        process.exit(1);
                      }
                    })
                    .catch(err => {
                      console.error('Cleanup failed:', err);
                      process.exit(1);
                    });
              env:
                - name: REGISTRY_URL
                  value: "http://registry.local:5000"
                - name: KEEP_LATEST
                  value: "5"
                - name: IMAGE_PREFIX
                  value: "optio-agent"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-cleanup-sa
  namespace: optio
  labels:
    app.kubernetes.io/name: image-registry-cleanup
    app.kubernetes.io/component: cleanup
---
# RBAC: Allow the cleanup job to read secrets (for registry auth if needed)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: image-cleanup-role
  namespace: optio
  labels:
    app.kubernetes.io/name: image-registry-cleanup
    app.kubernetes.io/component: cleanup
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["registry-auth"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-cleanup-binding
  namespace: optio
  labels:
    app.kubernetes.io/name: image-registry-cleanup
    app.kubernetes.io/component: cleanup
subjects:
  - kind: ServiceAccount
    name: image-cleanup-sa
    namespace: optio
roleRef:
  kind: Role
  name: image-cleanup-role
  apiGroup: rbac.authorization.k8s.io
